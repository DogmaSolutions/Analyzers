name: Bug Report
description: Report a false positive, missed diagnostic, or other bug
labels: ["bug"]
body:
  - type: input
    id: rule
    attributes:
      label: Analyzer Rule
      description: Which rule is affected? (e.g. DSA003)
      placeholder: DSAxxx
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Code to Reproduce
      description: A minimal C# snippet that demonstrates the issue.
      render: csharp
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What happens instead?
    validations:
      required: true

  - type: input
    id: dotnet-version
    attributes:
      label: .NET SDK Version
      description: Output of `dotnet --version`
      placeholder: "9.0.100"
    validations:
      required: false

  - type: input
    id: package-version
    attributes:
      label: NuGet Package Version
      description: Version of DogmaSolutions.Analyzers you are using
      placeholder: "1.0.0"
    validations:
      required: false
